name: ci/cd pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: checkout project
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install dependencies
        run: bun install --ignore-scripts

      - name: run linter
        run: bun lint
        continue-on-error: true

      - name: run formatter check
        run: bun format --check
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rachoon_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: checkout project
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install dependencies
        run: bun install --ignore-scripts

      - name: run backend tests
        run: cd apps/backend && bun test
        env:
          APP_KEY: test-key-for-ci-only-not-secure
          APP_NAME: rachoon-test
          NODE_ENV: test
          DB_CONNECTION: pg
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: testuser
          PG_PASSWORD: testpass
          PG_DB_NAME: rachoon_test
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    # needs:
    #   - code-quality
    #   - test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: get package version
        id: package-version
        run: |
          cd ./apps/backend
          echo "VERSION=$(npm version patch --no-git-tag-version)" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          VERSION=${{ steps.package-version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${VERSION}"
          git push origin "${VERSION}"
          echo "Created and pushed tag ${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.package-version.outputs.VERSION }}

          # Find the most recent tag that isn't the one we just created
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits between previous tag and the new tag
            CHANGELOG=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save changelog to output
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.package-version.outputs.VERSION }}';
            const changelog = `${{ steps.changelog.outputs.CHANGELOG }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Release ${version}`,
              body: `## What's Changed\n\n${changelog}`,
              draft: false,
              prerelease: version.includes('-alpha') || version.includes('-beta') || version.includes('-rc')
            });

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup docker builder
        uses: docker/setup-buildx-action@v3

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.actor }}/rachoon:${{ github.ref_name }}
            ghcr.io/${{ github.actor }}/rachoon:latest
            ghcr.io/${{ github.actor }}/rachoon:${{ steps.package-version.outputs.VERSION }}
